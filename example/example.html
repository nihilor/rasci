<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>example</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; padding: 2rem; background: #ffffff; color: #24292f; }
    h1   { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; color: #24292f; }
  </style>
</head>
<body>
  <h1>example</h1>
  <style>
:root {
  --rasci-border: #d0d7de;
  --rasci-bg-corner: #f6f8fa;
  --rasci-bg-header: #eef2f6;
  --rasci-bg-task: #ffffff;
  --rasci-text-primary: #24292f;
  --rasci-text-muted: #8c959f;

  --rasci-r-bg: #fff8c5;
  --rasci-r-fg: #7d4e00;
  --rasci-a-bg: #ffebe9;
  --rasci-a-fg: #953800;
  --rasci-s-bg: #dafbe1;
  --rasci-s-fg: #116329;
  --rasci-c-bg: #ddf4ff;
  --rasci-c-fg: #0a3069;
  --rasci-i-bg: #f6f8fa;
  --rasci-i-fg: #57606a;
}

.rasci-wrapper {
  overflow-x: auto;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  font-size: 13px;
}
.rasci-table {
  border-collapse: collapse;
  inline-size: 100%;
  min-inline-size: 400px;
}
.rasci-table th,
.rasci-table td {
  border: 1px solid var(--rasci-border);
  padding: 5px 10px;
  text-align: center;
  white-space: nowrap;
}
.rasci-task-header,
.rasci-task-label {
  text-align: left;
  min-inline-size: 180px;
}
.rasci-corner          { background: var(--rasci-bg-corner); }
.rasci-group-header    { background: var(--rasci-bg-header); font-weight: 600; font-size: 11px; letter-spacing: .04em; color: #57606a; }
.rasci-role-header     { background: var(--rasci-bg-corner); font-weight: 600; color: var(--rasci-text-primary); }
.rasci-task-label      { background: var(--rasci-bg-task); color: var(--rasci-text-primary); white-space: normal; line-height: 1.35; }
.rasci-task-main       { font-weight: 500; }
.rasci-task-details    { margin-block-start: 4px; }
.rasci-task-details summary { cursor: pointer; }
.rasci-task-desc       { margin-block-start: 2px; font-size: 11px; color: var(--rasci-text-muted); }
.rasci-phase-header    { background: var(--rasci-bg-header); font-weight: 600; text-align: left; color: var(--rasci-text-primary); padding: 4px 10px; }

.rasci-cell            { font-weight: 500; font-size: 12px; }
.rasci-empty           { color: var(--rasci-text-muted); }

.rasci-attr {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  block-size: 1.9em;
  inline-size: 1.9em;
  margin: 0 .08em;
  border-radius: 999px;
  border: 1px solid transparent;
  box-sizing: border-box;
  line-height: 1;
}

.rasci-R { background: var(--rasci-r-bg); color: var(--rasci-r-fg); border-color: var(--rasci-r-fg); }
.rasci-A { background: var(--rasci-a-bg); color: var(--rasci-a-fg); border-color: var(--rasci-a-fg); }
.rasci-S { background: var(--rasci-s-bg); color: var(--rasci-s-fg); border-color: var(--rasci-s-fg); }
.rasci-C { background: var(--rasci-c-bg); color: var(--rasci-c-fg); border-color: var(--rasci-c-fg); }
.rasci-I { background: var(--rasci-i-bg); color: var(--rasci-i-fg); border-color: var(--rasci-i-fg); }

.rasci-link            { color: inherit; opacity: .6; text-decoration: none; margin-left: 4px; font-size: 11px; }
.rasci-link:hover      { opacity: 1; }
</style>
<div class="rasci-wrapper">
<table class="rasci-table" role="grid">
<thead>
<tr>
<th class="rasci-corner"></th>
<th class="rasci-group-header" colspan="3"></th>
<th class="rasci-group-header" colspan="2">Engineering</th>
<th class="rasci-group-header" colspan="2">Platform</th>
</tr>
<tr>
<th class="rasci-task-header">Task</th>
<th class="rasci-role-header" title="Product Owner">PO</th>
<th class="rasci-role-header" title="Project Manager">PM</th>
<th class="rasci-role-header" title="Stakeholder">Stakeholder</th>
<th class="rasci-role-header" title="Frontend Engineer">FE</th>
<th class="rasci-role-header" title="Backend Engineer">BE</th>
<th class="rasci-role-header" title="Operations">OPS</th>
<th class="rasci-role-header" title="Security">SEC</th>
</tr>
</thead>
<tbody>
<tr><td class="rasci-phase-header" colspan="8" title="Clarify Requirements and Constraints">Discovery <a class="rasci-link" href="https://wiki.example.com/discovery" target="_blank" rel="noopener">↗</a></td></tr>
<tr>
<td class="rasci-task-label" title="Stakeholder interviews and documentation"><details class="rasci-task-details" open><summary><span class="rasci-task-main">Collect requirements</span></summary><div class="rasci-task-desc">Stakeholder interviews and documentation</div></details></td>
<td class="rasci-cell"><span class="rasci-attr rasci-A">A</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-R">R</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-I">I</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-C">C</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-C">C</span></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell rasci-empty"></td>
</tr>
<tr>
<td class="rasci-task-label"><span class="rasci-task-main">Analyze market</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-A">A</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-R">R</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-C">C</span></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell rasci-empty"></td>
</tr>
<tr><td class="rasci-phase-header" colspan="8">Realization</td></tr>
<tr>
<td class="rasci-task-label"><span class="rasci-task-main">Design architecture <a class="rasci-link" href="https://wiki.example.com/adr/001" target="_blank" rel="noopener">↗</a></span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-A">A</span></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell"><span class="rasci-attr rasci-R">R</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-R">R</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-C">C</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-C">C</span></td>
</tr>
<tr>
<td class="rasci-task-label"><span class="rasci-task-main">Prepare deployment</span></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell"><span class="rasci-attr rasci-A">A</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-I">I</span></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell"><span class="rasci-attr rasci-S">S</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-R">R</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-C">C</span></td>
</tr>
<tr>
<td class="rasci-task-label"><span class="rasci-task-main">Approve release</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-A">A</span>, <span class="rasci-attr rasci-R">R</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-C">C</span></td>
<td class="rasci-cell"><span class="rasci-attr rasci-I">I</span></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell rasci-empty"></td>
<td class="rasci-cell rasci-empty"></td>
</tr>
</tbody>
</table>
</div>
</body>
</html>
